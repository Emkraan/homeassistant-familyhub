name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: dropdown
    id: data_source
    attributes:
      label: Data Source
      options:
        - Local (port 17654)
        - SmartThings Cloud API
        - Unknown
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Protocol / API Evidence
      description: If you know how the Family Hub exposes this data, share it here.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues and discussions
          required: true
